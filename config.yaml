# Description
# Baseline configuration where we use the original CLIP anchor loss
# with temperature as a learnable parameter.

# Identifiers
project_name: "modality_gap"
run_name: auto   # 'auto' / null / "" → coco_{model}_{YYYYMMDD-HHMMSS}; or set explicitly e.g. "MyRun"

# Never change parameters
seed: 42
learning_rate: 1e-4
batch_size: 256
model: "ViT-B-32"
num_train_samples: -1
num_test_samples: 2048
epochs: 100

# Experiment specific parameters
loss_type: "only_lunif_n_then_anchor+ALPHA*lalign+BETA*lunif(centroids)"
only_lunif_epochs: 0
anchor_temperature: 0.1
anchor_temperature_learnable: false

# Static loss weights (used by loss_type "only_lunif_n_then_anchor+lalign+lunif(centroids)").
# Other loss_types ignore these.
lambda1: 1.0
lambda2: 1.0

# Evaluation and checkpointing
save_checkpoint_every_n_epochs: 20
resume_checkpoint: False

# fp16
fp16: True


#BETA CONFIG
beta_warmup_epoch: 20
beta_decay_epoch: 50

#ALPHA CONFIG
alpha_warmup_epoch: 50
alpha_increment_epoch: 50
