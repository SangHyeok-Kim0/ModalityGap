# Description
# Baseline configuration where we use the original CLIP anchor loss
# with temperature as a learnable parameter.

# Identifiers
project_name: "modality_gap"
run_name: auto   # 'auto' / null / "" → {model}_bs{B}_lr{LR}_ep{E}_{Tlearn|Tfix}_{fp32|fp16|bf16}_[a{...}_][b{...}_]{YYYYMMDD-HHMMSS}; or set explicitly e.g. "MyRun"

# Never change parameters
seed: 42
learning_rate: 1e-4
batch_size: 128
model: "RN50"  # "RN50" / "RN101" / "RN50x4" / "RN50x16" / "RN50x64" / "ViT-B/32" / "ViT-L/14"
num_train_samples: -1
num_test_samples: -1
epochs: 100

# Experiment specific parameters
loss_type: "anchor"
only_lunif_epochs: 0
anchor_temperature: 0.1
anchor_temperature_learnable: True

# Static loss weights (used by loss_type "only_lunif_n_then_anchor+lalign+lunif(centroids)").
# Other loss_types ignore these.
lambda1: 1.0
lambda2: 1.0

# Evaluation and checkpointing
save_checkpoint_every_n_epochs: 10
# Cadence for inline per-epoch PCA snapshots (pca_latent_space_*.png +
# pca_latent_space_class_*.png) written to figures/PCA/. Reuses the
# embeddings evaluate_model already computes — no extra inference. 0 disables.
pca_plot_every_n_epochs: 1
resume_checkpoint: False

# Precision: "fp32" | "fp16" | "bf16"
# - bf16 has fp32-equivalent dynamic range and is recommended on Blackwell/Hopper/Ampere.
# - fp16 needs GradScaler (auto-enabled). bf16/fp32 do not.
precision: fp16


#BETA CONFIG
beta_warmup_epoch: 20
beta_decay_epoch: 50

#ALPHA CONFIG
alpha_warmup_epoch: 50
alpha_increment_epoch: 50
